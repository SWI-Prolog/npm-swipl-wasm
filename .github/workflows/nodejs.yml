# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches:
    - master
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: "24.15"
    - run: npm ci
    - run: npm run lint

  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: "24.15"
    - run: npm ci
    # The cache key covers everything that determines the WASM artifacts:
    # the pinned dependency versions AND the Docker build definition, so
    # that changes to docker/ invalidate previously cached artifacts.
    - run: echo "CACHE_KEY=$(cat ./build-config.json | jq '[.[]] | map(.version, .commit) | @tsv')-$(cat docker/* | sha256sum | cut -c1-16)" >> $GITHUB_ENV

    - name: Restore cached build
      id: cache
      uses: actions/cache@v6
      with:
        path: dist/swipl
        key: ${{ env.CACHE_KEY }}

    - name: Full Build
      if: steps.cache.outputs.cache-hit != 'true'
      run: npm run build

    - name: Partial Build
      if: steps.cache.outputs.cache-hit == 'true'
      run: npm run tsc

    - uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist

  test:
    needs: [ build ]
    strategy:
      matrix:
        # Node 24 is pinned to 24.15 because 24.16+ breaks puppeteer.
        # See https://github.com/puppeteer/puppeteer/issues/15071
        node-version: [16.x, 18.x, 19.x, 20.x, 22.x, "24.15", 25.x]
        os: [ ubuntu-22.04, macos-latest, windows-latest ]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js ${{ matrix.node-version }} on ${{ matrix.os }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - run: npm ci
    - uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist
    - run: npm test
    - run: npm run bundle:webpack

  ci-success:
    name: CI Success
    if: always()
    needs: [ lint, build, test ]
    runs-on: ubuntu-22.04
    permissions: {}
    steps:
    - name: Fail if any required job did not succeed
      if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
      run: |
        echo "One or more required jobs did not succeed."
        exit 1
    - name: All required jobs succeeded
      run: echo "All required jobs succeeded."

  release:
    if: ${{ github.ref == 'refs/heads/master' }}
    needs: [ test, lint ]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
      pages: write
      issues: write
      id-token: write
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: "24.15"
    - run: npm ci
    - uses: actions/download-artifact@v8
      with:
        name: dist
        path: dist
    - name: "Create Bundle"
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        # The semantic-release command errors if this folder does not exist
        mkdir ./bundle
        version=$(npx semantic-release --dry-run | grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+') || true
        if [ $version ]
        then
          npm run bundle:webpack -- --name=v$version
          npm run bundle:latest -- --name=v$version
        fi
    - name: Release
      env:
        # You may be tempted to make this github.token, this won't work
        # because GH Actions does not trigger workflows INCLUDING GITHUB PAGES RELEASES on github.token
        # to avoid recursive workflows.
        # See: https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: npx semantic-release
